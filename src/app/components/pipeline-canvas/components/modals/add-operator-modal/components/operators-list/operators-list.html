<h5 mat-dialog-title>Add Operator</h5>

<mat-dialog-content>
  @for (operator of operatorTypes; track $index) {
    <app-list-item [operatorsType]="operator" (operatorData)="setOperatorSelected($event)" />
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button matButton mat-dialog-close>Back</button>
</mat-dialog-actions>
