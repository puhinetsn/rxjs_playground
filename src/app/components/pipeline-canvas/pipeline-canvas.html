<div class="border-box no-hover elements-bcg p-3">
  <div class="py-2">
    <p class="border-line-b text-center">
      <span class="px-2">Observable source$</span>
    </p>
  </div>
  <div class="d-flex align-items-center gap-3">
    @for( subsc of subscriptions(); track $index){
      <app-subscription [subscription]="subsc" (deleteEl)="deleteSuscription($index)"/>
    }
    <app-add-subscriber (subsc)="addNewSubscriber()"/>
  </div>
</div>
